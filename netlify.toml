# https://docs.netlify.com/configure-builds/file-based-configuration/
# Canonical / OG / sitemap: production uses primary domain ($URL); previews use deploy URL.
# (DEPLOY_PRIME_URL is often main--site.netlify.app — wrong for canonical on custom domains.)
[build]
  command = "if [ \"$CONTEXT\" = production ]; then export VITE_SITE_URL=\"$URL\"; else export VITE_SITE_URL=\"${DEPLOY_PRIME_URL:-$URL}\"; fi && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback (safe if you add client routes or deep links later)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
